name: Update Submodules

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-submodules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update submodules
        id: update
        run: |
          git submodule update --remote --recursive

          # Check if there are changes
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No submodule updates available"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Submodule updates detected"
          fi

      - name: Create pull request
        if: steps.update.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            Update submodules to latest commits

            Signed-off-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          signoff: true
          branch: update-submodules-${{ github.run_number }}
          delete-branch: true
          title: "chore: Update submodules to latest commits"
          body: |
            ## Summary
            This PR updates the following submodules to their latest commits:

            - repos/multicluster-global-hub (main)
            - repos/glo-grafana (release-1.8)
            - repos/postgres_exporter (release-2.17)
            - repos/multicluster-global-hub-operator-bundle (release-1.8)
            - repos/multicluster-global-hub-operator-catalog (release-1.8)
            - repos/acm-workflows (main)

            ## Details
            Auto-generated by the daily submodule update workflow.

            🤖 Generated by GitHub Actions
          labels: |
            automated
            dependencies
